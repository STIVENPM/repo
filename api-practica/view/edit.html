<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Producto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
        rel="stylesheet">
        <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

  <div class="container mt-4">

    <h1>Editar Producto</h1>

<div class="card-form">

  <div class="form-grupo">
    <label for="title">Título</label>
    <input id="title" type="text" placeholder="Nombre del producto">
  </div>

  <div class="form-grupo">
    <label for="price">Precio</label>
    <input id="price" type="number" step="0.01" placeholder="Ej: 49.99">
  </div>

  <div class="form-grupo">
    <label for="category">Categoría</label>
    <input id="category" type="text" placeholder="Ej: beauty">
  </div>

  <div class="form-grupo">
    <label for="stock">Stock</label>
    <input id="stock" type="number" placeholder="Ej: 100">
  </div>

  <div class="form-acciones">
    <button class="btn btn-primary" onclick="createProductAction()">
      Guardar producto
    </button>
    <a href="index.html" class="btn btn-secondary">Cancelar</a>
  </div>

</div>
    </div>

  </div>

  <script src="../js/const.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/products.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <!-- 
    Este script va AL FINAL, después de cargar products.js.
    El evento DOMContentLoaded espera a que el HTML esté 
    completamente cargado antes de ejecutar loadProductForEdit().
    Si lo pusiéramos antes, los inputs todavía no existirían
    en el DOM y no podríamos rellenarlos.
  -->
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      loadProductForEdit();
    });
  </script>

</body>
</html>
