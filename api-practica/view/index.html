<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Productos</title>
<!-- barra superior -->
<div class="barra-acciones">

<!-- tabla -->
<table class="tabla-productos">
        <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="container mt-4">

    <h1>Lista de Productos</h1>

    <!-- Fila superior: input de búsqueda + botón consultar + botón agregar -->
    <div class="d-flex gap-2 mb-3 align-items-end">

      <div>
        <label for="idFilter">Buscar por ID</label>
        <input 
          id="idFilter" 
          type="number" 
          class="form-control"
          placeholder="Ej: 5"
          onchange="getProductByIdAction()">
      </div>

      <!-- Consultar todos recarga la tabla completa -->
      <button 
        class="btn btn-success" 
        onclick="getAllProductsAction()">
        Consultar todos
      </button>

      <!-- Agregar lleva al formulario de creación -->
      <a href="create.html" class="btn btn-primary">
        + Agregar producto
      </a>

    </div>

    <!-- Tabla de resultados -->
    <table class="table table-bordered table-hover">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Título</th>
          <th>Precio</th>
          <th>Acciones</th>  <!-- columna nueva para Editar y Eliminar -->
        </tr>
      </thead>
      <tbody id="container">
        <!-- Las filas se generan dinámicamente desde utils.js -->
      </tbody>
    </table>

  </div>

  <!-- El orden de los scripts es CLAVE, no cambiar -->
  <script src="../js/const.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/products.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
